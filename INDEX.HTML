<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema SOUSA DIAS - Academia</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- LOGOTIPO -->
  <header class="topo">
    <div class="logo">
      <div class="icone"></div>
      <div class="texto-logo">Sistema <span>SOUSA DIAS</span></div>
    </div>
  </header>

  <!-- LOGIN -->
  <div id="login-container" class="card">
    <h2>Login do Sistema</h2>
    <input type="text" id="usuario" placeholder="Usuário" />
    <input type="password" id="senha" placeholder="Senha" />
    <button onclick="fazerLogin()">Entrar</button>
  </div>

  <!-- SISTEMA -->
  <div id="sistema-container" style="display: none;">
    <h1 class="titulo">🏋️‍♂️ Painel da Academia</h1>

    <div class="botoes">
      <button onclick="mostrarAba('cadastro')">Cadastrar Aluno</button>
      <button onclick="mostrarAba('membros')">Ver Membros</button>
      <button onclick="mostrarAba('pagamentos')">Pagamentos</button>
      <button onclick="mostrarAba('relatorios')">Relatórios</button>
      <button onclick="mostrarAba('despesas')">Despesas</button>
      <button class="sair" onclick="logout()">Sair</button>
    </div>

    <!-- CADASTRO -->
    <div id="cadastro" class="aba">
      <h2>Cadastro de Alunos</h2>
      <input id="nome" placeholder="Nome do Aluno" />
      <input id="telefone" placeholder="Telefone" />
      <select id="plano">
        <option value="">Selecione o plano</option>
        <option value="Mensal">Mensal</option>
        <option value="Anual">Anual</option>
      </select>
      <input id="valor" placeholder="Valor" type="number" />
      <button onclick="cadastrarAluno()">Cadastrar</button>
    </div>

    <!-- MEMBROS -->
    <div id="membros" class="aba" style="display:none;">
      <h2>Lista de Membros</h2>
      <button onclick="listarAlunos()">Mostrar Alunos</button>
      <ul id="listaAlunos"></ul>
    </div>

    <!-- PAGAMENTOS -->
    <div id="pagamentos" class="aba" style="display:none;">
      <h2>Pagamentos</h2>
      <input id="idAluno" placeholder="ID do Aluno" type="number" />
      <input id="valorPago" placeholder="Valor Pago" type="number" />
      <button onclick="registrarPagamento()">Registrar Pagamento</button>
      <button onclick="excluirPagamento()">Excluir Pagamento</button>
    </div>

    <!-- RELATÓRIOS -->
    <div id="relatorios" class="aba" style="display:none;">
      <h2>Relatórios</h2>
      <button onclick="gerarRelatorio('adimplente')">Adimplentes</button>
      <button onclick="gerarRelatorio('inadimplente')">Inadimplentes</button>
      <button onclick="gerarRelatorio('saldo')">Saldo do Dia/Mês</button>
    </div>

    <!-- DESPESAS -->
    <div id="despesas" class="aba" style="display:none;">
      <h2>Despesas</h2>
      <input id="descricaoDespesa" placeholder="Descrição" />
      <input id="valorDespesa" placeholder="Valor" type="number" />
      <button onclick="registrarDespesa()">Registrar</button>
      <button onclick="excluirDespesa()">Excluir Última</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
